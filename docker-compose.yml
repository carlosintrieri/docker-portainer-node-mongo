version: "3.8"

services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  app:
    build: .
    container_name: node-crud
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://root:root@mongodb:27017/cruddb?authSource=admin
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridgedocker compose up --build